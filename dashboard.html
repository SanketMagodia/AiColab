<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MeshDash – Microsoft 365 Dashboard</title>
<script src="https://alcdn.msauth.net/browser/2.38.2/js/msal-browser.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ═══════════════ THEMES ═══════════════ */
:root,
[data-theme="midnight"] {
  --bg-0: #0a0b12;
  --bg-1: #12141d;
  --card: rgba(26, 29, 42, 0.72);
  --card-solid: #1a1d2a;
  --card-hover: rgba(38, 42, 58, 0.9);
  --accent: #6ea8ff;
  --accent-2: #a78bfa;
  --accent-grad: linear-gradient(135deg, #6ea8ff 0%, #a78bfa 100%);
  --text: #e6eaf5;
  --text-muted: #8a90a5;
  --border: rgba(255, 255, 255, 0.08);
  --border-strong: rgba(255, 255, 255, 0.14);
  --email-accent: #6ea8ff;
  --cal-accent: #34d399;
  --task-accent: #f59e0b;
  --chat-accent: #c084fc;
  --danger: #ef4444;
  --coral: #fb923c;
  --amber-bg: rgba(245, 158, 11, 0.12);
  --glow: 0 0 24px rgba(110, 168, 255, 0.35);
  --shadow-card: 0 10px 40px -10px rgba(0, 0, 0, 0.5), 0 2px 6px rgba(0, 0, 0, 0.3);
  --blob-1: radial-gradient(circle at 15% 20%, rgba(110, 168, 255, 0.25), transparent 50%);
  --blob-2: radial-gradient(circle at 85% 80%, rgba(167, 139, 250, 0.22), transparent 55%);
  --blob-3: radial-gradient(circle at 50% 50%, rgba(52, 211, 153, 0.10), transparent 60%);
  --header-h: 64px;
}

[data-theme="ocean"] {
  --bg-0: #05131f;
  --bg-1: #0a2236;
  --card: rgba(15, 42, 63, 0.7);
  --card-solid: #0f2a3f;
  --card-hover: rgba(24, 58, 85, 0.9);
  --accent: #22d3ee;
  --accent-2: #60a5fa;
  --accent-grad: linear-gradient(135deg, #22d3ee 0%, #3b82f6 100%);
  --text: #e0f2fe;
  --text-muted: #7aa4b8;
  --border: rgba(148, 216, 255, 0.10);
  --border-strong: rgba(148, 216, 255, 0.2);
  --email-accent: #22d3ee;
  --cal-accent: #4ade80;
  --task-accent: #fbbf24;
  --chat-accent: #818cf8;
  --danger: #f87171;
  --coral: #fb923c;
  --amber-bg: rgba(251, 191, 36, 0.12);
  --glow: 0 0 24px rgba(34, 211, 238, 0.4);
  --shadow-card: 0 10px 40px -10px rgba(0, 20, 40, 0.6), 0 2px 6px rgba(0, 0, 0, 0.3);
  --blob-1: radial-gradient(circle at 10% 10%, rgba(34, 211, 238, 0.28), transparent 50%);
  --blob-2: radial-gradient(circle at 90% 90%, rgba(59, 130, 246, 0.22), transparent 55%);
  --blob-3: radial-gradient(circle at 60% 30%, rgba(14, 165, 233, 0.15), transparent 60%);
}

[data-theme="sunset"] {
  --bg-0: #1a0a14;
  --bg-1: #2b0f1f;
  --card: rgba(45, 19, 36, 0.72);
  --card-solid: #2d1324;
  --card-hover: rgba(62, 28, 50, 0.9);
  --accent: #fb7185;
  --accent-2: #f59e0b;
  --accent-grad: linear-gradient(135deg, #fb7185 0%, #f59e0b 100%);
  --text: #fce7f3;
  --text-muted: #b08a99;
  --border: rgba(251, 113, 133, 0.12);
  --border-strong: rgba(251, 113, 133, 0.22);
  --email-accent: #fb7185;
  --cal-accent: #34d399;
  --task-accent: #fbbf24;
  --chat-accent: #c084fc;
  --danger: #ef4444;
  --coral: #fb923c;
  --amber-bg: rgba(251, 191, 36, 0.15);
  --glow: 0 0 24px rgba(251, 113, 133, 0.4);
  --shadow-card: 0 10px 40px -10px rgba(40, 0, 20, 0.6), 0 2px 6px rgba(0, 0, 0, 0.3);
  --blob-1: radial-gradient(circle at 20% 20%, rgba(251, 113, 133, 0.3), transparent 50%);
  --blob-2: radial-gradient(circle at 80% 80%, rgba(245, 158, 11, 0.25), transparent 55%);
  --blob-3: radial-gradient(circle at 50% 0%, rgba(192, 132, 252, 0.18), transparent 60%);
}

[data-theme="forest"] {
  --bg-0: #07130e;
  --bg-1: #0d2219;
  --card: rgba(16, 39, 30, 0.72);
  --card-solid: #10271e;
  --card-hover: rgba(24, 54, 42, 0.9);
  --accent: #34d399;
  --accent-2: #a3e635;
  --accent-grad: linear-gradient(135deg, #34d399 0%, #a3e635 100%);
  --text: #ecfccb;
  --text-muted: #8a9f8d;
  --border: rgba(163, 230, 53, 0.10);
  --border-strong: rgba(163, 230, 53, 0.2);
  --email-accent: #60a5fa;
  --cal-accent: #34d399;
  --task-accent: #fbbf24;
  --chat-accent: #a3e635;
  --danger: #f87171;
  --coral: #fb923c;
  --amber-bg: rgba(251, 191, 36, 0.12);
  --glow: 0 0 24px rgba(52, 211, 153, 0.4);
  --shadow-card: 0 10px 40px -10px rgba(0, 20, 10, 0.6), 0 2px 6px rgba(0, 0, 0, 0.3);
  --blob-1: radial-gradient(circle at 20% 30%, rgba(52, 211, 153, 0.28), transparent 50%);
  --blob-2: radial-gradient(circle at 80% 70%, rgba(163, 230, 53, 0.22), transparent 55%);
  --blob-3: radial-gradient(circle at 50% 100%, rgba(16, 185, 129, 0.18), transparent 60%);
}

[data-theme="light"] {
  --bg-0: #f4f5fa;
  --bg-1: #eaecf3;
  --card: rgba(255, 255, 255, 0.82);
  --card-solid: #ffffff;
  --card-hover: rgba(240, 243, 250, 0.95);
  --accent: #4f46e5;
  --accent-2: #ec4899;
  --accent-grad: linear-gradient(135deg, #4f46e5 0%, #ec4899 100%);
  --text: #1a1d2a;
  --text-muted: #64708a;
  --border: rgba(20, 25, 50, 0.08);
  --border-strong: rgba(20, 25, 50, 0.16);
  --email-accent: #4f46e5;
  --cal-accent: #059669;
  --task-accent: #d97706;
  --chat-accent: #9333ea;
  --danger: #dc2626;
  --coral: #ea580c;
  --amber-bg: rgba(217, 119, 6, 0.10);
  --glow: 0 0 24px rgba(79, 70, 229, 0.28);
  --shadow-card: 0 10px 40px -10px rgba(20, 25, 50, 0.15), 0 2px 6px rgba(20, 25, 50, 0.06);
  --blob-1: radial-gradient(circle at 15% 20%, rgba(79, 70, 229, 0.18), transparent 50%);
  --blob-2: radial-gradient(circle at 85% 80%, rgba(236, 72, 153, 0.15), transparent 55%);
  --blob-3: radial-gradient(circle at 50% 50%, rgba(14, 165, 233, 0.10), transparent 60%);
}

html { font-size: 14px; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg-0);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  letter-spacing: -0.01em;
  transition: background 0.6s ease, color 0.4s ease;
}

/* Animated gradient backdrop */
body::before {
  content: "";
  position: fixed; inset: 0; z-index: -2;
  background:
    var(--blob-1),
    var(--blob-2),
    var(--blob-3),
    linear-gradient(135deg, var(--bg-0) 0%, var(--bg-1) 100%);
  animation: floatBg 20s ease-in-out infinite alternate;
  transition: background 0.6s ease;
}
body::after {
  content: "";
  position: fixed; inset: 0; z-index: -1;
  background-image:
    radial-gradient(circle at 1px 1px, var(--border-strong) 1px, transparent 0);
  background-size: 36px 36px;
  opacity: 0.35;
  pointer-events: none;
  mask-image: radial-gradient(ellipse at center, black 20%, transparent 80%);
}

@keyframes floatBg {
  0%   { transform: scale(1) translate(0, 0); }
  50%  { transform: scale(1.05) translate(-2%, 1%); }
  100% { transform: scale(1) translate(2%, -1%); }
}

/* ═══════════════ HEADER ═══════════════ */
.header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  height: var(--header-h);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px;
  background: var(--card);
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  border-bottom: 1px solid var(--border);
  animation: slideDown 0.5s cubic-bezier(0.22, 1, 0.36, 1);
}
.header-left, .header-right { display: flex; align-items: center; gap: 14px; }

.brand {
  font-weight: 800; font-size: 1rem; letter-spacing: -0.02em;
  background: var(--accent-grad);
  -webkit-background-clip: text; background-clip: text; color: transparent;
  padding-right: 6px;
}

.avatar {
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--accent-grad); color: #fff;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 0.85rem;
  overflow: hidden;
  box-shadow: var(--glow);
  transition: transform 0.3s cubic-bezier(0.22, 1, 0.36, 1);
}
.avatar:hover { transform: scale(1.08) rotate(-3deg); }
.avatar img { width: 100%; height: 100%; object-fit: cover; }

.user-name { font-weight: 600; font-size: 0.9rem; }
.clock {
  font-family: 'JetBrains Mono', 'Cascadia Code', monospace;
  font-size: 1.05rem; font-weight: 500;
  background: var(--accent-grad);
  -webkit-background-clip: text; background-clip: text; color: transparent;
}
.date-display { color: var(--text-muted); font-size: 0.82rem; font-weight: 500; }

.badge {
  display: inline-flex; align-items: center; justify-content: center;
  min-width: 22px; height: 22px; padding: 0 7px;
  border-radius: 11px; font-size: 0.72rem; font-weight: 700; color: #fff;
  transition: transform 0.2s;
}
.badge:hover { transform: scale(1.12); }
.badge-blue { background: linear-gradient(135deg, var(--accent), var(--accent-2)); }
.badge-amber { background: linear-gradient(135deg, var(--task-accent), var(--coral)); }
.badge-green { background: linear-gradient(135deg, var(--cal-accent), #10b981); color: #04210f; }

.status-dot {
  width: 10px; height: 10px; border-radius: 50%;
  background: var(--cal-accent);
  box-shadow: 0 0 10px var(--cal-accent);
  transition: all 0.3s;
  animation: breathe 2.4s ease-in-out infinite;
}
.status-dot.error {
  background: var(--danger);
  box-shadow: 0 0 10px var(--danger);
}

@keyframes breathe {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.6; transform: scale(0.9); }
}

.btn {
  padding: 7px 14px; border-radius: 10px;
  border: 1px solid var(--border-strong);
  background: var(--card); color: var(--text); cursor: pointer;
  font-size: 0.82rem; font-weight: 500;
  font-family: inherit;
  transition: all 0.25s cubic-bezier(0.22, 1, 0.36, 1);
  backdrop-filter: blur(10px);
}
.btn:hover {
  border-color: var(--accent);
  background: var(--card-hover);
  transform: translateY(-1px);
  box-shadow: 0 4px 12px -2px rgba(0, 0, 0, 0.2);
}
.btn:active { transform: translateY(0) scale(0.97); }
.btn-primary {
  background: var(--accent-grad);
  border-color: transparent; color: #fff;
  box-shadow: var(--glow);
}
.btn-primary:hover { filter: brightness(1.1); box-shadow: 0 0 32px -4px var(--accent); }
.btn-sm { padding: 5px 11px; font-size: 0.78rem; border-radius: 8px; }
.btn-icon {
  width: 34px; height: 34px; padding: 0;
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 1rem;
}

/* Theme picker */
.theme-picker { position: relative; }
.theme-menu {
  position: absolute; top: calc(100% + 8px); right: 0;
  background: var(--card);
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  border: 1px solid var(--border-strong);
  border-radius: 14px;
  padding: 8px;
  min-width: 180px;
  box-shadow: var(--shadow-card);
  display: none;
  z-index: 200;
  transform-origin: top right;
  animation: popIn 0.22s cubic-bezier(0.22, 1, 0.36, 1);
}
.theme-picker.open .theme-menu { display: block; }
.theme-option {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 10px; border-radius: 8px; cursor: pointer;
  font-size: 0.85rem; font-weight: 500;
  transition: background 0.2s;
}
.theme-option:hover { background: var(--card-hover); }
.theme-option.active { background: var(--card-hover); color: var(--accent); }
.theme-swatch {
  width: 22px; height: 22px; border-radius: 7px;
  border: 1px solid var(--border-strong);
  flex-shrink: 0;
}
.swatch-midnight { background: linear-gradient(135deg, #6ea8ff, #a78bfa); }
.swatch-ocean    { background: linear-gradient(135deg, #22d3ee, #3b82f6); }
.swatch-sunset   { background: linear-gradient(135deg, #fb7185, #f59e0b); }
.swatch-forest   { background: linear-gradient(135deg, #34d399, #a3e635); }
.swatch-light    { background: linear-gradient(135deg, #4f46e5, #ec4899); }

@keyframes popIn {
  from { opacity: 0; transform: scale(0.92) translateY(-4px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}
@keyframes slideDown {
  from { opacity: 0; transform: translateY(-100%); }
  to { opacity: 1; transform: translateY(0); }
}

/* ═══════════════ LOGIN ═══════════════ */
.login-screen {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 100vh; gap: 20px; padding: 24px; text-align: center;
  animation: fadeUp 0.8s cubic-bezier(0.22, 1, 0.36, 1);
}
.login-logo {
  width: 72px; height: 72px; border-radius: 22px;
  background: var(--accent-grad);
  display: flex; align-items: center; justify-content: center;
  font-size: 2rem; font-weight: 800; color: #fff;
  box-shadow: var(--glow), var(--shadow-card);
  margin-bottom: 8px;
  animation: floatLogo 4s ease-in-out infinite;
}
@keyframes floatLogo {
  0%, 100% { transform: translateY(0) rotate(0deg); }
  50% { transform: translateY(-8px) rotate(3deg); }
}
.login-screen h1 {
  font-size: 2.6rem; font-weight: 800; letter-spacing: -0.03em;
  background: var(--accent-grad);
  -webkit-background-clip: text; background-clip: text; color: transparent;
}
.login-screen p { color: var(--text-muted); max-width: 420px; line-height: 1.6; font-size: 0.95rem; }
.login-btn {
  padding: 13px 32px; border-radius: 14px; border: none;
  background: var(--accent-grad); color: #fff; font-size: 0.95rem;
  font-weight: 600; cursor: pointer; font-family: inherit;
  transition: all 0.3s cubic-bezier(0.22, 1, 0.36, 1);
  box-shadow: var(--glow);
  margin-top: 8px;
}
.login-btn:hover {
  transform: translateY(-3px) scale(1.02);
  box-shadow: 0 16px 40px -8px var(--accent);
}
.login-btn:active { transform: translateY(-1px) scale(0.99); }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ═══════════════ DASHBOARD GRID ═══════════════ */
.dashboard {
  display: none;
  padding: calc(var(--header-h) + 16px) 16px 16px;
  gap: 16px;
}
.dashboard.active {
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: 1fr 1fr;
  height: calc(100vh - var(--header-h) - 32px);
  min-height: 500px;
}

/* ═══════════════ PANELS ═══════════════ */
.panel {
  background: var(--card);
  backdrop-filter: blur(20px) saturate(160%);
  -webkit-backdrop-filter: blur(20px) saturate(160%);
  border-radius: 18px;
  border: 1px solid var(--border);
  display: flex; flex-direction: column;
  overflow: hidden;
  position: relative;
  box-shadow: var(--shadow-card);
  transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1),
              box-shadow 0.4s ease,
              border-color 0.3s ease;
  animation: panelIn 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
}
.panel::before {
  content: "";
  position: absolute; inset: 0;
  border-radius: inherit;
  padding: 1px;
  background: linear-gradient(135deg, var(--border-strong), transparent 40%, transparent 60%, var(--border-strong));
  -webkit-mask:
    linear-gradient(#fff 0 0) content-box,
    linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
          mask-composite: exclude;
  pointer-events: none;
  opacity: 0.6;
}
.panel::after {
  content: "";
  position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: var(--panel-accent, var(--accent));
  opacity: 0.9;
  transition: opacity 0.3s;
}
.panel:hover {
  transform: translateY(-2px);
  box-shadow: 0 20px 60px -12px rgba(0, 0, 0, 0.5), 0 2px 6px rgba(0, 0, 0, 0.3);
  border-color: var(--border-strong);
}
.panel-email    { --panel-accent: linear-gradient(90deg, var(--email-accent), var(--accent-2)); animation-delay: 0.05s; }
.panel-calendar { --panel-accent: linear-gradient(90deg, var(--cal-accent), #10b981); animation-delay: 0.12s; }
.panel-tasks    { --panel-accent: linear-gradient(90deg, var(--task-accent), var(--coral)); animation-delay: 0.19s; }
.panel-chat     { --panel-accent: linear-gradient(90deg, var(--chat-accent), var(--accent-2)); animation-delay: 0.26s; }

@keyframes panelIn {
  from { opacity: 0; transform: translateY(16px) scale(0.98); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.panel-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 18px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.panel-title {
  font-weight: 700; font-size: 0.98rem;
  letter-spacing: -0.01em;
  display: flex; align-items: center; gap: 10px;
}
.panel-title .icon {
  font-size: 1rem;
  width: 28px; height: 28px; border-radius: 8px;
  display: inline-flex; align-items: center; justify-content: center;
  background: var(--card-hover);
  border: 1px solid var(--border-strong);
}
.panel-email    .panel-title .icon { color: var(--email-accent); }
.panel-calendar .panel-title .icon { color: var(--cal-accent); }
.panel-tasks    .panel-title .icon { color: var(--task-accent); }
.panel-chat     .panel-title .icon { color: var(--chat-accent); }

.notification-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--danger);
  display: none;
  box-shadow: 0 0 10px var(--danger);
  animation: pulse 1.5s infinite;
}
.notification-dot.visible { display: inline-block; }

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.4; transform: scale(1.35); }
}

.panel-body {
  flex: 1; overflow-y: auto; padding: 12px 16px;
  scrollbar-width: thin;
  scrollbar-color: var(--border-strong) transparent;
}
.panel-body::-webkit-scrollbar { width: 8px; }
.panel-body::-webkit-scrollbar-track { background: transparent; }
.panel-body::-webkit-scrollbar-thumb {
  background: var(--border-strong); border-radius: 4px;
  border: 2px solid transparent; background-clip: padding-box;
}
.panel-body::-webkit-scrollbar-thumb:hover { background: var(--accent); background-clip: padding-box; border: 2px solid transparent; }

.panel-footer {
  padding: 12px 16px;
  border-top: 1px solid var(--border);
  flex-shrink: 0;
  background: linear-gradient(180deg, transparent, rgba(0, 0, 0, 0.08));
}

.panel-error {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 10px; padding: 24px; color: var(--danger); text-align: center;
  height: 100%;
}
.panel-loading {
  display: flex; align-items: center; justify-content: center;
  gap: 10px;
  height: 100%; color: var(--text-muted);
  font-size: 0.88rem;
}
.panel-loading::before {
  content: "";
  width: 16px; height: 16px; border-radius: 50%;
  border: 2px solid var(--border-strong);
  border-top-color: var(--accent);
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ═══════════════ EMAIL ═══════════════ */
.email-item {
  padding: 11px 13px; border-radius: 12px; cursor: pointer;
  border: 1px solid transparent;
  transition: all 0.25s cubic-bezier(0.22, 1, 0.36, 1);
  margin-bottom: 6px;
  animation: slideIn 0.4s cubic-bezier(0.22, 1, 0.36, 1);
  position: relative;
}
.email-item:hover {
  background: var(--card-hover);
  border-color: var(--border-strong);
  transform: translateX(3px);
}
.email-item.unread {
  background: linear-gradient(90deg, rgba(110, 168, 255, 0.06), transparent 50%);
}
.email-item.unread::before {
  content: "";
  position: absolute; left: 0; top: 10px; bottom: 10px; width: 3px;
  border-radius: 3px;
  background: var(--accent-grad);
}
.email-item.highlight {
  background: var(--amber-bg);
  border: 1px solid var(--task-accent);
  box-shadow: 0 0 16px -4px var(--task-accent);
}
.email-from { font-weight: 600; font-size: 0.9rem; letter-spacing: -0.01em; }
.email-subject { font-size: 0.85rem; margin-top: 3px; font-weight: 500; }

/* ═══════════════ CALENDAR ═══════════════ */
.cal-timeline { display: flex; flex-direction: column; gap: 4px; margin-bottom: 16px; }

.cal-hour-events { flex: 1; display: flex; flex-direction: column; gap: 4px; }

}
.cal-event-time {
  font-family: 'JetBrains Mono', monospace;

}

}

/* ═══════════════ TASKS ═══════════════ */
.task-list-group { margin-bottom: 16px; }
.task-list-name {
  font-weight: 700; font-size: 0.78rem;

  text-transform: uppercase; letter-spacing: 0.08em;
}
.task-item {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 9px 12px; border-radius: 10px; margin-bottom: 5px;
  background: var(--card-hover);
  border: 1px solid var(--border);

}
.task-item:hover { transform: translateX(3px); border-color: var(--border-strong); }

}

.task-checkbox {
  width: 20px; height: 20px; border-radius: 50%;
  border: 2px solid var(--border-strong); background: transparent;
  cursor: pointer; flex-shrink: 0; margin-top: 1px;
  transition: all 0.25s cubic-bezier(0.22, 1, 0.36, 1);

}
.task-checkbox:hover { border-color: var(--cal-accent); transform: scale(1.1); }

}
.task-checkbox.checked::after { content: '✓'; color: #fff; font-size: 0.72rem; font-weight: 800; }

@keyframes checkPop {

  50%  { transform: scale(1.25); }

.task-info { flex: 1; }

/* ═══════════════ FORMS ═══════════════ */
.inline-form { display: flex; gap: 8px; flex-wrap: wrap; align-items: flex-end; }

  transition: all 0.2s;

  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(110, 168, 255, 0.18);

/* ═══════════════ ANIMATIONS ═══════════════ */
@keyframes slideIn {
  from { opacity: 0; transform: translateY(-6px); }
  to { opacity: 1; transform: translateY(0); }
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;

<body>

<!-- ─── Login ─── -->

<script>
// ═══════════════════════════════════════════════════════
//  CONFIGURATION
// ═══════════════════════════════════════════════════════
const TENANT_ID     = "94f560ae-d351-4a27-81be-a31c6cdc3a76";
const CLIENT_ID     = "cd11af18-d128-4fd8-9278-63fa0321a0e5";
const REDIRECT_URI  = "http://localhost:3000";

const GRAPH_BASE    = "https://graph.microsoft.com/v1.0";
const SCOPES        = [
  "Mail.Read",
  "Calendars.Read",
  "Calendars.ReadWrite",
  "Chat.Read",
  "Chat.ReadBasic",
  "Chat.ReadWrite",
  "Tasks.ReadWrite",
  "User.Read",
  "ChannelMessage.ReadWrite"
];

const HIGHLIGHT_TERMS = ["sanket", "sanketmagodia"];
const POLL_INTERVAL   = 60_000;

// ═══════════════════════════════════════════════════════
//  MSAL SETUP
// ═══════════════════════════════════════════════════════
const msalConfig = {
  auth: {
    clientId: CLIENT_ID,
    authority: `https://login.microsoftonline.com/${TENANT_ID}`,
    redirectUri: REDIRECT_URI,
  },
  cache: {
    cacheLocation: "sessionStorage",
    storeAuthStateInCookie: false,
  },
};

let msalInstance = null;
let accessToken  = null;
let currentAccount = null;

// ═══════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════
const seenEmailIds  = new Set();
const seenEventIds  = new Set();
const seenChatMsgIds = new Set();
const seenTaskIds   = new Set();
let taskListsCache  = [];
let isFirstLoad     = { email: true, calendar: true, tasks: true, chat: true };

// ═══════════════════════════════════════════════════════
//  AUDIO (Web Audio API beep)
// ═══════════════════════════════════════════════════════
let audioCtx = null;
function playPing() {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.type = "sine";
    osc.frequency.setValueAtTime(880, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(440, audioCtx.currentTime + 0.15);
    gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
    osc.start(audioCtx.currentTime);
    osc.stop(audioCtx.currentTime + 0.3);
  } catch { /* ignore audio errors */ }
}

// ═══════════════════════════════════════════════════════
//  NOTIFICATIONS
// ═══════════════════════════════════════════════════════
function requestNotifPermission() {
  if ("Notification" in window && Notification.permission === "default") {
    Notification.requestPermission();
  }
}

function sendNotification(title, body) {
  playPing();
  if ("Notification" in window && Notification.permission === "granted") {
    new Notification(title, { body, icon: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>" });
  }
}

// ═══════════════════════════════════════════════════════
//  AUTH
// ═══════════════════════════════════════════════════════
async function initMsal() {
  msalInstance = new msal.PublicClientApplication(msalConfig);
  await msalInstance.initialize();
  const accounts = msalInstance.getAllAccounts();
  if (accounts.length > 0) {
    currentAccount = accounts[0];
    await acquireToken();
    showDashboard();
  }
}

async function signIn() {
  try {
    const resp = await msalInstance.loginPopup({ scopes: SCOPES });
    currentAccount = resp.account;
    accessToken = resp.accessToken;
    showDashboard();
  } catch (err) {
    document.getElementById("loginError").textContent = `Login failed: ${err.message}`;
    document.getElementById("loginError").style.display = "block";
  }
}

async function acquireToken() {
  try {
    const resp = await msalInstance.acquireTokenSilent({ scopes: SCOPES, account: currentAccount });
    accessToken = resp.accessToken;
    setStatus(true);
    return accessToken;
  } catch {
    try {
      const resp = await msalInstance.acquireTokenPopup({ scopes: SCOPES });
      accessToken = resp.accessToken;
      currentAccount = resp.account;
      setStatus(true);
      return accessToken;
    } catch (err) {
      setStatus(false);
      throw err;
    }
  }
}

// ═══════════════════════════════════════════════════════
//  GRAPH FETCH HELPER
// ═══════════════════════════════════════════════════════
async function graphFetch(endpoint, options = {}) {
  await acquireToken();
  const resp = await fetch(`${GRAPH_BASE}${endpoint}`, {
    ...options,
    headers: {
      "Authorization": `Bearer ${accessToken}`,
      "Content-Type": "application/json",
      ...(options.headers || {}),
    },
  });
  if (!resp.ok) {
    const errText = await resp.text().catch(() => resp.statusText);
    throw new Error(`Graph ${resp.status}: ${errText}`);
  }
  if (resp.status === 204) return null;
  return resp.json();
}

// ═══════════════════════════════════════════════════════
//  UI HELPERS
// ═══════════════════════════════════════════════════════
function setStatus(ok) {
  const dot = document.getElementById("statusDot");
  dot.classList.toggle("error", !ok);
  dot.title = ok ? "Connected" : "Connection error";
}

function showDashboard() {
  document.getElementById("loginScreen").style.display = "none";
  document.getElementById("appHeader").style.display = "flex";
  document.getElementById("dashboard").classList.add("active");
  requestNotifPermission();
  loadUserProfile();
  startClock();
  refreshAll();
  startPolling();
}

function escapeHtml(str) {
  const div = document.createElement("div");
  div.textContent = str || "";
  return div.innerHTML;
}

function containsHighlight(text) {
  if (!text) return false;
  const lower = text.toLowerCase();
  return HIGHLIGHT_TERMS.some(t => lower.includes(t));
}

function formatTime(dateStr) {
  if (!dateStr) return "";
  const d = new Date(dateStr);
  return d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
}

function formatDate(dateStr) {
  if (!dateStr) return "";
  const d = new Date(dateStr);
  return d.toLocaleDateString([], { weekday: "short", month: "short", day: "numeric" });
}

function formatRelativeTime(dateStr) {
  if (!dateStr) return "";
  const d = new Date(dateStr);
  const now = new Date();
  const diff = d - now;
  if (diff < 0) return "now";
  const mins = Math.floor(diff / 60000);
  const hrs = Math.floor(mins / 60);
  if (hrs > 0) return `${hrs}h ${mins % 60}m`;
  return `${mins}m`;
}

function getInitials(name) {
  if (!name) return "?";
  return name.split(" ").map(w => w[0]).join("").toUpperCase().slice(0, 2);
}

function showNotifDot(id) {
  const dot = document.getElementById(id);
  if (dot) dot.classList.add("visible");
}

function hideNotifDot(id) {
  const dot = document.getElementById(id);
  if (dot) dot.classList.remove("visible");
}

function renderError(containerId, message) {
  document.getElementById(containerId).innerHTML = `
    <div class="panel-error">
      <span style="font-size:1.5rem;">⚠</span>
      <span>${escapeHtml(message)}</span>
      <button class="btn btn-sm" onclick="refreshAll()">Retry</button>
    </div>`;
}

// ═══════════════════════════════════════════════════════
//  CLOCK & DATE
// ═══════════════════════════════════════════════════════
function startClock() {
  function tick() {
    const now = new Date();
    document.getElementById("clock").textContent = now.toLocaleTimeString();
    document.getElementById("dateDisplay").textContent = now.toLocaleDateString([], { weekday: "long", year: "numeric", month: "long", day: "numeric" });
  }
  tick();
  setInterval(tick, 1000);
}

// ═══════════════════════════════════════════════════════
//  USER PROFILE
// ═══════════════════════════════════════════════════════
async function loadUserProfile() {
  try {
    const me = await graphFetch("/me");
    document.getElementById("userName").textContent = me.displayName || me.userPrincipalName;
    document.getElementById("userAvatar").textContent = getInitials(me.displayName);
    try {
      await acquireToken();
      const photoResp = await fetch(`${GRAPH_BASE}/me/photo/$value`, {
        headers: { "Authorization": `Bearer ${accessToken}` },
      });
      if (photoResp.ok) {
        const blob = await photoResp.blob();
        const url = URL.createObjectURL(blob);
        document.getElementById("userAvatar").innerHTML = `<img src="${url}" alt="avatar">`;
      }
    } catch { /* no photo, keep initials */ }
  } catch { /* profile load failed, non-critical */ }
}

// ═══════════════════════════════════════════════════════
//  EMAIL
// ═══════════════════════════════════════════════════════
async function loadEmails() {
  try {
    const data = await graphFetch("/me/mailFolders/inbox/messages?$top=30&$orderby=receivedDateTime desc&$select=id,subject,bodyPreview,body,from,receivedDateTime,isRead");
    const messages = data.value || [];
    const container = document.getElementById("emailBody");

    let newCount = 0;
    messages.forEach(m => {
      if (!seenEmailIds.has(m.id)) {
        if (!isFirstLoad.email) {
          newCount++;
          sendNotification("New Email", `${m.from?.emailAddress?.name}: ${m.subject}`);
        }
        seenEmailIds.add(m.id);
      }
    });

    if (newCount > 0) showNotifDot("emailDot");
    isFirstLoad.email = false;

    const unreadCount = messages.filter(m => !m.isRead).length;
    document.getElementById("emailUnreadBadge").textContent = unreadCount;
    document.getElementById("badgeEmails").textContent = unreadCount;

    if (messages.length === 0) {
      container.innerHTML = '<div class="panel-loading">No emails found</div>';
      return;
    }

    container.innerHTML = messages.map(m => {
      const hl = containsHighlight(m.subject) || containsHighlight(m.bodyPreview) ? " highlight" : "";
      const unread = !m.isRead ? " unread" : "";
      return `
        <div class="email-item${unread}${hl}" data-id="${m.id}" onclick="toggleEmail(this, '${m.id}', ${!m.isRead})">
          <span class="email-time">${formatTime(m.receivedDateTime)}</span>
          <div class="email-from">${escapeHtml(m.from?.emailAddress?.name || m.from?.emailAddress?.address)}</div>
          <div class="email-subject">${escapeHtml(m.subject)}</div>
          <div class="email-preview">${escapeHtml(m.bodyPreview)}</div>
        </div>`;
    }).join("");
  } catch (err) {
    renderError("emailBody", `Email: ${err.message}`);
  }
}

async function toggleEmail(el, id, wasUnread) {
  const existing = el.querySelector(".email-body-expanded");
  if (existing) {
    existing.remove();
    return;
  }
  try {
    const msg = await graphFetch(`/me/messages/${id}?$select=body`);
    const div = document.createElement("div");
    div.className = "email-body-expanded";
    const tempDiv = document.createElement("div");
    tempDiv.innerHTML = msg.body?.content || "(no body)";
    div.textContent = tempDiv.textContent || tempDiv.innerText;
    el.appendChild(div);

    if (wasUnread) {
      try {
        await graphFetch(`/me/messages/${id}`, {
          method: "PATCH",
          body: JSON.stringify({ isRead: true }),
        });
        el.classList.remove("unread");
        const badge = document.getElementById("emailUnreadBadge");
        const cur = parseInt(badge.textContent) || 0;
        badge.textContent = Math.max(0, cur - 1);
        document.getElementById("badgeEmails").textContent = Math.max(0, cur - 1);
      } catch { /* non-critical */ }
    }
  } catch (err) {
    const div = document.createElement("div");
    div.className = "email-body-expanded";
    div.textContent = `Error loading body: ${err.message}`;
    el.appendChild(div);
  }
}

// ═══════════════════════════════════════════════════════
//  CALENDAR
// ═══════════════════════════════════════════════════════
async function loadCalendar() {
  try {
    const now = new Date();
    const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    const weekEnd = new Date(todayStart);
    weekEnd.setDate(weekEnd.getDate() + 8);

    const data = await graphFetch(
      `/me/calendarView?startDateTime=${todayStart.toISOString()}&endDateTime=${weekEnd.toISOString()}&$top=50&$orderby=start/dateTime&$select=id,subject,start,end,isAllDay`
    );
    const events = data.value || [];
    const container = document.getElementById("calBody");

    let newCount = 0;
    events.forEach(e => {
      if (!seenEventIds.has(e.id)) {
        if (!isFirstLoad.calendar) {
          newCount++;
          sendNotification("New Calendar Event", e.subject);
        }
        seenEventIds.add(e.id);
      }
    });

    if (newCount > 0) showNotifDot("calDot");
    isFirstLoad.calendar = false;

    const todayEnd = new Date(todayStart);
    todayEnd.setDate(todayEnd.getDate() + 1);
    const todayEvents = events.filter(e => new Date(e.start.dateTime + "Z") < todayEnd);
    const weekEvents = events.filter(e => new Date(e.start.dateTime + "Z") >= todayEnd);

    document.getElementById("badgeEvents").textContent = todayEvents.length;

    // next event countdown
    const upcoming = events.find(e => new Date(e.start.dateTime + "Z") > now);
    let countdownHtml = "";
    if (upcoming) {
      const rel = formatRelativeTime(upcoming.start.dateTime + "Z");
      countdownHtml = `<div class="cal-countdown">⏱ Next: <strong>${escapeHtml(upcoming.subject)}</strong> in ${rel}</div>`;
    }

    // timeline for today (8am–8pm)
    const hours = [];
    for (let h = 7; h <= 21; h++) {
      const hourStart = new Date(todayStart);
      hourStart.setHours(h);
      const hourEnd = new Date(todayStart);
      hourEnd.setHours(h + 1);
      const eventsInHour = todayEvents.filter(e => {
        const es = new Date(e.start.dateTime + "Z");
        const ee = new Date(e.end.dateTime + "Z");
        return es < hourEnd && ee > hourStart;
      });
      if (eventsInHour.length > 0 || (h >= 8 && h <= 18)) {
        const twoHoursFromNow = new Date(now.getTime() + 2 * 60 * 60 * 1000);
        hours.push(`
          <div class="cal-hour-block">
            <span class="cal-hour-label">${h.toString().padStart(2, "0")}:00</span>
            <div class="cal-hour-events">
              ${eventsInHour.map(e => {
                const es = new Date(e.start.dateTime + "Z");
                const isSoon = es > now && es <= twoHoursFromNow;
                return `<div class="cal-event${isSoon ? " soon" : ""}">
                  <span class="cal-event-time">${formatTime(e.start.dateTime + "Z")}–${formatTime(e.end.dateTime + "Z")}</span>
                  ${escapeHtml(e.subject)}
                </div>`;
              }).join("")}
            </div>
          </div>`);
      }
    }

    let weekHtml = "";
    if (weekEvents.length > 0) {
      weekHtml = `<div class="cal-section-title">Next 7 Days</div>` + weekEvents.map(e => `
        <div class="cal-week-event">
          <span class="cal-week-date">${formatDate(e.start.dateTime + "Z")} ${formatTime(e.start.dateTime + "Z")}</span> — ${escapeHtml(e.subject)}
        </div>`).join("");
    }

    container.innerHTML = countdownHtml +
      (hours.length > 0 ? `<div class="cal-timeline">${hours.join("")}</div>` : '<div style="color:var(--text-muted);padding:8px 0;">No events today</div>') +
      weekHtml;

    if (events.length === 0) {
      container.innerHTML = '<div class="panel-loading">No upcoming events</div>';
    }
  } catch (err) {
    renderError("calBody", `Calendar: ${err.message}`);
  }
}

function toggleCalForm() {
  const f = document.getElementById("calFooter");
  f.style.display = f.style.display === "none" ? "block" : "none";
}

async function addCalEvent() {
  const name = document.getElementById("calEventName").value.trim();
  const start = document.getElementById("calEventStart").value;
  const end = document.getElementById("calEventEnd").value;
  if (!name || !start || !end) return;
  try {
    await graphFetch("/me/events", {
      method: "POST",
      body: JSON.stringify({
        subject: name,
        start: { dateTime: start, timeZone: Intl.DateTimeFormat().resolvedOptions().timeZone },
        end: { dateTime: end, timeZone: Intl.DateTimeFormat().resolvedOptions().timeZone },
      }),
    });
    document.getElementById("calEventName").value = "";
    document.getElementById("calEventStart").value = "";
    document.getElementById("calEventEnd").value = "";
    toggleCalForm();
    loadCalendar();
  } catch (err) {
    alert(`Failed to create event: ${err.message}`);
  }
}

// ═══════════════════════════════════════════════════════
//  TASKS (Microsoft To Do)
// ═══════════════════════════════════════════════════════
async function loadTasks() {
  try {
    const listsData = await graphFetch("/me/todo/lists?$top=20");
    const lists = listsData.value || [];
    taskListsCache = lists;

    const select = document.getElementById("taskListSelect");
    select.innerHTML = lists.map(l => `<option value="${l.id}">${escapeHtml(l.displayName)}</option>`).join("");

    const container = document.getElementById("taskBody");
    const now = new Date();
    const todayStr = now.toISOString().split("T")[0];

    let allTasksHtml = "";
    let dueTodayCount = 0;
    let newCount = 0;

    for (const list of lists) {
      const tasksData = await graphFetch(`/me/todo/lists/${list.id}/tasks?$top=50&$filter=status ne 'completed'`);
      let tasks = tasksData.value || [];

      tasks.forEach(t => {
        if (!seenTaskIds.has(t.id)) {
          if (!isFirstLoad.tasks) {
            newCount++;
          }
          seenTaskIds.add(t.id);
        }
      });

      tasks.sort((a, b) => {
        const aDue = a.dueDateTime?.dateTime ? new Date(a.dueDateTime.dateTime) : null;
        const bDue = b.dueDateTime?.dateTime ? new Date(b.dueDateTime.dateTime) : null;
        const aKey = !aDue ? 3 : (aDue < now ? 0 : aDue.toISOString().split("T")[0] === todayStr ? 1 : 2);
        const bKey = !bDue ? 3 : (bDue < now ? 0 : bDue.toISOString().split("T")[0] === todayStr ? 1 : 2);
        if (aKey !== bKey) return aKey - bKey;
        if (aDue && bDue) return aDue - bDue;
        return 0;
      });

      if (tasks.length === 0) continue;

      let tasksHtml = tasks.map(t => {
        const due = t.dueDateTime?.dateTime ? new Date(t.dueDateTime.dateTime) : null;
        const dueStr = due ? due.toISOString().split("T")[0] : null;
        const isOverdue = due && due < now && dueStr !== todayStr;
        const isDueToday = dueStr === todayStr;
        const isCompleted = t.status === "completed";

        if (isDueToday) dueTodayCount++;

        let cls = "task-item";
        if (isCompleted) cls += " completed";
        else if (isOverdue) cls += " overdue";
        else if (isDueToday) cls += " due-today";

        const dueLabel = due ? `<span class="task-due${isOverdue ? " overdue" : ""}">${formatDate(due)}</span>` : "";

        return `
          <div class="${cls}">
            <div class="task-checkbox${isCompleted ? " checked" : ""}" onclick="completeTask('${list.id}', '${t.id}', this, event)"></div>
            <div class="task-info">
              <div class="task-title">${escapeHtml(t.title)}</div>
              ${dueLabel}
            </div>
          </div>`;
      }).join("");

      allTasksHtml += `<div class="task-list-group"><div class="task-list-name">${escapeHtml(list.displayName)}</div>${tasksHtml}</div>`;
    }

    if (newCount > 0) showNotifDot("taskDot");
    isFirstLoad.tasks = false;

    document.getElementById("badgeTasks").textContent = dueTodayCount;
    container.innerHTML = allTasksHtml || '<div class="panel-loading">No tasks</div>';
  } catch (err) {
    renderError("taskBody", `Tasks: ${err.message}`);
  }
}

async function completeTask(listId, taskId, el, event) {
  event.stopPropagation();
  try {
    await graphFetch(`/me/todo/lists/${listId}/tasks/${taskId}`, {
      method: "PATCH",
      body: JSON.stringify({ status: "completed" }),
    });
    el.classList.add("checked");
    el.closest(".task-item").classList.add("completed");
  } catch (err) {
    alert(`Failed to complete task: ${err.message}`);
  }
}

async function addTask() {
  const title = document.getElementById("taskTitle").value.trim();
  const due = document.getElementById("taskDue").value;
  const listId = document.getElementById("taskListSelect").value;
  if (!title || !listId) return;

  const body = { title };
  if (due) {
    body.dueDateTime = { dateTime: due + "T00:00:00", timeZone: Intl.DateTimeFormat().resolvedOptions().timeZone };
  }

  try {
    await graphFetch(`/me/todo/lists/${listId}/tasks`, {
      method: "POST",
      body: JSON.stringify(body),
    });
    document.getElementById("taskTitle").value = "";
    document.getElementById("taskDue").value = "";
    loadTasks();
  } catch (err) {
    alert(`Failed to add task: ${err.message}`);
  }
}

// ═══════════════════════════════════════════════════════
//  CHAT (Microsoft Teams)
// ═══════════════════════════════════════════════════════
async function loadChats() {
  try {
    const chatsData = await graphFetch("/me/chats?$top=20&$expand=lastMessagePreview&$orderby=lastMessagePreview/createdDateTime desc");
    const chats = chatsData.value || [];
    const container = document.getElementById("chatBody");

    let newCount = 0;

    const chatItems = [];
    for (const chat of chats) {
      const preview = chat.lastMessagePreview;
      if (!preview) continue;

      const msgId = preview.id || `${chat.id}-${preview.createdDateTime}`;
      if (!seenChatMsgIds.has(msgId)) {
        if (!isFirstLoad.chat) {
          newCount++;
          sendNotification("New Chat Message", `${preview.from?.user?.displayName || "Someone"}: ${preview.body?.content || ""}`);
        }
        seenChatMsgIds.add(msgId);
      }

      const senderName = preview.from?.user?.displayName || chat.topic || "Chat";
      const body = preview.body?.content || "";
      const plainBody = body.replace(/<[^>]*>/g, "");
      const hl = containsHighlight(plainBody) || containsHighlight(senderName) || containsHighlight(chat.topic) ? " highlight" : "";

      chatItems.push(`
        <div class="chat-item${hl}" onclick="toggleChatReply(this)">
          <div class="chat-top">
            <div class="chat-avatar">${getInitials(senderName)}</div>
            <span class="chat-sender">${escapeHtml(senderName)}</span>
            <span class="chat-time">${formatTime(preview.createdDateTime)}</span>
          </div>
          <div class="chat-preview">${escapeHtml(plainBody)}</div>
          <div class="chat-reply-box" data-chatid="${chat.id}">
            <input class="chat-reply-input" placeholder="Reply…" onkeydown="if(event.key==='Enter')sendReply(this)" onclick="event.stopPropagation()">
            <button class="btn btn-sm btn-primary" onclick="event.stopPropagation(); sendReply(this.previousElementSibling)">Send</button>
          </div>
        </div>`);
    }

    if (newCount > 0) showNotifDot("chatDot");
    isFirstLoad.chat = false;

    container.innerHTML = chatItems.length > 0 ? chatItems.join("") : '<div class="panel-loading">No recent chats</div>';
  } catch (err) {
    renderError("chatBody", `Chat: ${err.message}`);
  }
}

function toggleChatReply(el) {
  const box = el.querySelector(".chat-reply-box");
  box.classList.toggle("open");
  if (box.classList.contains("open")) {
    box.querySelector("input").focus();
  }
}

async function sendReply(inputEl) {
  const text = inputEl.value.trim();
  if (!text) return;
  const chatId = inputEl.closest(".chat-reply-box").dataset.chatid;
  try {
    await graphFetch(`/me/chats/${chatId}/messages`, {
      method: "POST",
      body: JSON.stringify({
        body: { contentType: "text", content: text },
      }),
    });
    inputEl.value = "";
    inputEl.closest(".chat-reply-box").classList.remove("open");
    loadChats();
  } catch (err) {
    alert(`Failed to send reply: ${err.message}`);
  }
}

// ═══════════════════════════════════════════════════════
//  REFRESH & POLLING
// ═══════════════════════════════════════════════════════
async function refreshAll() {
  hideNotifDot("emailDot");
  hideNotifDot("calDot");
  hideNotifDot("taskDot");
  hideNotifDot("chatDot");
  loadEmails();
  loadCalendar();
  loadTasks();
  loadChats();
}

function startPolling() {
  setInterval(() => loadEmails(), POLL_INTERVAL);
  setTimeout(() => setInterval(() => loadCalendar(), POLL_INTERVAL), 5000);
  setTimeout(() => setInterval(() => loadTasks(), POLL_INTERVAL), 10000);
  setTimeout(() => setInterval(() => loadChats(), POLL_INTERVAL), 15000);
}

// ═══════════════════════════════════════════════════════
//  THEME SWITCHER
// ═══════════════════════════════════════════════════════
const THEMES = ["midnight", "ocean", "sunset", "forest", "light"];

function setTheme(name) {
  if (!THEMES.includes(name)) name = "midnight";
  document.documentElement.setAttribute("data-theme", name);
  try { localStorage.setItem("meshdash-theme", name); } catch {}
  document.querySelectorAll(".theme-option").forEach(el => {
    el.classList.toggle("active", el.dataset.theme === name);
  });
  const picker = document.getElementById("themePicker");
  if (picker) picker.classList.remove("open");
}

function toggleThemeMenu(e) {
  e.stopPropagation();
  document.getElementById("themePicker").classList.toggle("open");
}

function initTheme() {
  let saved = "midnight";
  try { saved = localStorage.getItem("meshdash-theme") || "midnight"; } catch {}
  setTheme(saved);
  document.addEventListener("click", () => {
    const p = document.getElementById("themePicker");
    if (p) p.classList.remove("open");
  });
}

// ═══════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════
window.addEventListener("DOMContentLoaded", () => {
  initTheme();
  initMsal();
});
